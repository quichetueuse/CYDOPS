<!DOCTYPE html>
<html>
 <head><title>Premier labo</title>
<style>
select {
  display: flex;
  justify-content: space-between;
  align-items: center;
  color: white;
  border-radius: 5px;
  border: 2px solid #ADD8E6;
  cursor: pointer;
  font-weight: 700;
  padding: 10px;
  background-color: #6495ED;
}
body {
    background-color: #e0e0e0; /* Light background */
    display: flex;
    justify-content: center;
    align-items: center;
    height: 100vh;
}
.neumorphic-card {
    padding: 20px;
    border-radius: 15px;
    background: #e0e0e0;
    box-shadow: 10px 10px 20px #a3b1c6,
                -10px -10px 20px #ffffff; /* Neumorphic shadows */
    width: 300px;
    text-align: center;
    transition: all 0.3s ease;
}

.neumorphic-card:hover {
    box-shadow: 5px 5px 15px #a3b1c6,
                -5px -5px 15px #ffffff; /* Lighter shadows on hover */
}
</style>
</head>
<body>
 <h1>Mise en œuvre CI/CD </h1>
 <p style="background-color: aquamarine; color: red; font-size: 24pt; font-weight: bold;">La page est en ligne !</p>
 <select>
	<option selected="selected" value=".txt">Format texte</option>
	<option value=".exe">Executable</option>
	<option value=".py">Python</option>
	<option value=".c">Fichier compilé C</option>
	<option value="css">Cascading Style Sheet</option>
	<option value="php">Php</option>
</select>
<input type="Text" value="default">
<input type="number">
<input type="date">
<input type="range">
<input type="color">
<input type="file">
<input type="checkbox">
<input type="email">
<input type="tel">
<div class="neumorphic-card">
    <h2>Carte de test</h2>
    <p>Petit texte de test pour voir le style de la page</p>
</div>
</body>
</html>
