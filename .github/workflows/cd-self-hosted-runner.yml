name: Installation et Publication de l'application

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: self-hosted

    steps:
      - name: Récupération du code
        uses: actions/checkout@v4

      - name: Installation nginx
        run: |
          sudo apt update
          sudo apt install -y nginx

      - name: Création du dossier
        run: |
          sudo mkdir -p /var/www/site
          sudo chown -R www-data:www-data /var/www/site

      - name: Configuration nginx
        run: |
          sudo tee /etc/nginx/sites-available/site > /dev/null << 'EOF'
          server {
              listen 80;
              server_name _;
              root /var/www/site;
              index index.html;

              location / {
                  try_files $uri $uri/ =404;
              }
          }
          EOF

      - name: Copie des fichiers du site
        run: |
          sudo cp -r $GITHUB_WORKSPACE/* /var/www/site/
          sudo chown -R www-data:www-data /var/www/site

      - name: Activation du site nginx
        run: |
          sudo ln -sf /etc/nginx/sites-available/site /etc/nginx/sites-enabled/site
          sudo rm -f /etc/nginx/sites-enabled/default

      - name: Vérification et redémarrage nginx
        run: |
          sudo nginx -t
          sudo systemctl restart nginx
          sudo systemctl enable nginx
